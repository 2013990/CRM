{% extends "base.html" %}

{% block title %}客户管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h3>客户列表</h3>
    <a class="btn btn-primary">➕ 新增客户</a>
</div>

<table class="table table-striped table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>名称</th>
            <th>电话</th>
            <th>地址</th>
            <th width="120">操作</th>
        </tr>
    </thead>
    <tbody>
        {% for c in customers %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.phone }}</td>
            <td>{{ c.address }}</td>
            <td>
                <a class="btn btn-sm btn-outline-info">查看</a>
                <a class="btn btn-sm btn-outline-warning">编辑</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center text-muted">
                暂无客户数据
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
